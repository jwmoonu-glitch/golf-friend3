<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Friend 매장 근태 시스템</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif; background: #F9FAFB; color: #111827; }
.cell { height: 40px; min-width: 46px; font-size: 12px; text-align: center; cursor: pointer; border: 1px solid #E5E7EB; }
.cell:hover { filter: brightness(0.93); }
::-webkit-scrollbar { height: 6px; width: 6px; }
::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 999px; }
input, select, button { font-family: inherit; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f 0%,#2563EB 100%);">
  <div style="background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:22px;font-weight:800;color:#1e3a5f;letter-spacing:-0.5px;">GOLF FRIEND</div>
      <div style="font-size:13px;color:#6B7280;margin-top:4px;">매장 근태 관리 시스템</div>
    </div>
    <div style="margin-bottom:14px;">
      <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">매장 선택</label>
      <select id="login-store" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:14px;outline:none;background:#fff;">
        <option value="">매장을 선택하세요</option>
        <option>분당점</option><option>도곡점</option><option>송도점</option>
        <option>해운대점</option><option>송파점</option><option>고잔점</option>
        <option>풍동점</option><option>오산점</option><option>부산동래점</option>
        <option>서울 창동점</option><option>서울 목동점</option><option>원주점</option>
        <option>김해점</option><option>광교점</option><option>울산점</option><option>창원점</option>
      </select>
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">비밀번호</label>
      <input id="login-pw" type="password" placeholder="비밀번호 입력"
        style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:14px;outline:none;"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div id="login-err" style="display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:8px 12px;font-size:12px;color:#DC2626;margin-bottom:12px;"></div>
    <button onclick="doLogin()" style="width:100%;padding:12px;border-radius:8px;border:none;background:#2563EB;color:#fff;font-size:14px;font-weight:700;cursor:pointer;">로그인</button>
  </div>
</div>

<!-- 메인 화면 -->
<div id="main-screen" style="display:none;">
  <header style="background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="font-size:16px;font-weight:800;color:#1e3a5f;">GOLF FRIEND</div>
      <div id="store-badge" style="background:#EFF6FF;color:#2563EB;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="header-status" style="font-size:12px;color:#059669;opacity:0;transition:opacity 0.5s;"></span>
      <span id="header-month" style="font-size:13px;color:#374151;font-weight:600;"></span>
      <button onclick="doLogout()" style="padding:5px 12px;border-radius:6px;border:1px solid #E5E7EB;background:#fff;font-size:12px;color:#6B7280;cursor:pointer;">로그아웃</button>
    </div>
  </header>

  <div style="background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;display:flex;gap:0;">
    <button id="tab-shift" onclick="showTab('shift')" style="padding:14px 20px;border:none;border-bottom:2px solid #2563EB;background:transparent;font-size:13px;font-weight:700;color:#2563EB;cursor:pointer;">📅 월간 시프트</button>
    <button id="tab-attn"  onclick="showTab('attn')"  style="padding:14px 20px;border:none;border-bottom:2px solid transparent;background:transparent;font-size:13px;font-weight:600;color:#6B7280;cursor:pointer;">⚠️ 근태 기록</button>
    <button id="tab-leave" onclick="showTab('leave')" style="padding:14px 20px;border:none;border-bottom:2px solid transparent;background:transparent;font-size:13px;font-weight:600;color:#6B7280;cursor:pointer;">📋 휴무/휴가 신청</button>
  </div>

  <!-- 월간 시프트 -->
  <div id="tab-shift-content" style="padding:20px 24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <h2 style="font-size:18px;font-weight:700;">월간 시프트</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <select id="shift-year" style="padding:6px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
          <option value="2026">2026년</option><option value="2025">2025년</option>
        </select>
        <select id="shift-month" style="padding:6px 10px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
          <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
          <option value="4">4월</option><option value="5">5월</option><option value="6" selected>6월</option>
          <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
          <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
        </select>
        <button onclick="saveAllShifts()" style="padding:7px 16px;border-radius:8px;border:none;background:#2563EB;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">💾 전체 저장</button>
      </div>
    </div>
    <div id="shift-legend" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;"></div>
    <div style="overflow-x:auto;background:#fff;border-radius:10px;border:1px solid #E5E7EB;">
      <table id="store-shift-table" style="border-collapse:collapse;font-size:12px;min-width:100%;">
        <thead id="store-shift-head"></thead>
        <tbody id="store-shift-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 근태 기록 -->
  <div id="tab-attn-content" style="display:none;padding:20px 24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="font-size:18px;font-weight:700;">근태 기록</h2>
      <button onclick="showAttnModal()" style="padding:7px 16px;border-radius:8px;border:none;background:#2563EB;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">+ 근태 기록 추가</button>
    </div>
    <div style="background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="background:#F9FAFB;border-bottom:2px solid #E5E7EB;text-align:left;">
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">날짜</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">직원명</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">근태 유형</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">시작 시간</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">종료 시간</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">비고</th>
        </tr></thead>
        <tbody id="attn-list-body"><tr><td colspan="6" style="padding:32px;text-align:center;color:#9CA3AF;">기록된 근태가 없습니다.</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- 휴무/휴가 신청 -->
  <div id="tab-leave-content" style="display:none;padding:20px 24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h2 style="font-size:18px;font-weight:700;">휴무/휴가 신청</h2>
      <button onclick="showLeaveModal()" style="padding:7px 16px;border-radius:8px;border:none;background:#2563EB;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">+ 신청하기</button>
    </div>
    <div style="background:#fff;border:1px solid #E5E7EB;border-radius:10px;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="background:#F9FAFB;border-bottom:2px solid #E5E7EB;text-align:left;">
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">신청일</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">직원명</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">신청 유형</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">대상 날짜</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">사유</th>
          <th style="padding:10px 16px;font-weight:600;color:#6B7280;">상태</th>
        </tr></thead>
        <tbody id="leave-list-body"><tr><td colspan="6" style="padding:32px;text-align:center;color:#9CA3AF;">신청 내역이 없습니다.</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 근태 기록 모달 -->
<div id="attn-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <div style="padding:18px 24px;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:16px;font-weight:700;">근태 기록 추가</div>
      <button onclick="closeAttnModal()" style="border:none;background:#F3F4F6;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;">✕</button>
    </div>
    <div style="padding:20px 24px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">직원명 *</label>
          <select id="attn-emp" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;background:#fff;"></select>
        </div>
        <div>
          <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">날짜 *</label>
          <input id="attn-date" type="date" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
        </div>
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">근태 유형 *</label>
        <select id="attn-type" onchange="toggleAttnTime()" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;background:#fff;">
          <option value="">선택</option>
          <option>지각</option><option>조퇴</option><option>외출</option><option>결근</option>
          <option>연차</option><option>반차</option><option>공가</option><option>파견근무</option><option>휴직</option>
        </select>
      </div>
      <div id="attn-time-row" style="display:none;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">시작 시간</label>
          <input id="attn-start" type="time" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
        </div>
        <div>
          <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">종료 시간</label>
          <input id="attn-end" type="time" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">비고</label>
        <input id="attn-note" type="text" placeholder="특이사항 입력" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
      </div>
      <div id="attn-err" style="display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:8px 12px;font-size:12px;color:#DC2626;margin-bottom:12px;"></div>
      <div style="display:flex;gap:8px;">
        <button onclick="closeAttnModal()" style="flex:1;padding:10px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;font-size:13px;font-weight:600;color:#6B7280;cursor:pointer;">취소</button>
        <button onclick="submitAttn()" style="flex:2;padding:10px;border-radius:8px;border:none;background:#2563EB;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 휴무/휴가 신청 모달 -->
<div id="leave-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <div style="padding:18px 24px;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:16px;font-weight:700;">휴무/휴가 신청</div>
      <button onclick="closeLeaveModal()" style="border:none;background:#F3F4F6;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;">✕</button>
    </div>
    <div style="padding:20px 24px;">
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">신청자 *</label>
        <select id="leave-emp" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;background:#fff;"></select>
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">신청 유형 *</label>
        <select id="leave-type" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;background:#fff;">
          <option value="">선택</option>
          <option>휴무 변경</option><option>연차</option><option>반차</option><option>공가</option>
        </select>
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">대상 날짜 *</label>
        <input id="leave-date" type="date" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:5px;">사유 *</label>
        <input id="leave-reason" type="text" placeholder="신청 사유 입력" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;outline:none;">
      </div>
      <div id="leave-err" style="display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;padding:8px 12px;font-size:12px;color:#DC2626;margin-bottom:12px;"></div>
      <div style="display:flex;gap:8px;">
        <button onclick="closeLeaveModal()" style="flex:1;padding:10px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;font-size:13px;font-weight:600;color:#6B7280;cursor:pointer;">취소</button>
        <button onclick="submitLeave()" style="flex:2;padding:10px;border-radius:8px;border:none;background:#2563EB;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">신청</button>
      </div>
    </div>
  </div>
</div>

<!-- 셀 피커 -->

function apiGet(action, params) {
  params = params || {};
  var url = GS_API + '?action=' + action;
  Object.keys(params).forEach(function(k) {
    url += '&' + k + '=' + encodeURIComponent(params[k]);
  });
  return fetch(url).then(function(r) { return r.json(); });
}
function apiPost(action, data) {
  return fetch(GS_API + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)))
    .then(function(r) { return r.json(); });
}
function showStatus(msg, isErr) {
  var el = document.getElementById('header-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isErr ? '#DC2626' : '#059669';
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 2500);
}

function doLogin() {
  var store = document.getElementById('login-store').value;
  var pw    = document.getElementById('login-pw').value;
  var err   = document.getElementById('login-err');
  if (!store || !pw) {
    err.textContent = '매장과 비밀번호를 입력해주세요.';
    err.style.display = 'block'; return;
  }
  err.style.display = 'none';
  err.textContent = '로그인 중...';
  err.style.display = 'block';
  err.style.color = '#2563EB';
  err.style.background = '#EFF6FF';
  err.style.borderColor = '#BFDBFE';
  apiPost('storeLogin', { store: store, password: pw }).then(function(r) {
    if (r.ok) {
      currentStore = store;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display  = 'block';
      document.getElementById('store-badge').textContent    = store;
      init();
    } else {
      err.textContent = r.error || '로그인 실패';
      err.style.color = '#DC2626';
      err.style.background = '#FEF2F2';
      err.style.borderColor = '#FECACA';
    }
  }).catch(function() {
    err.textContent = '서버 연결 실패. 잠시 후 다시 시도해주세요.';
    err.style.display = 'block';
  });
}
function doLogout() {
  currentStore = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display  = 'none';
  document.getElementById('login-pw').value = '';
}

function init() {
  currentYear  = parseInt(document.getElementById('shift-year').value)  || 2026;
  currentMonth = parseInt(document.getElementById('shift-month').value) || 6;
  updateHeaderMonth();
  var today = new Date().toISOString().slice(0,10);
  storeEmps = employeeData.filter(function(e) {
    return e.store === currentStore && (!e.leaveDate || e.leaveDate > today);
  }).sort(function(a,b) { return a.joinDate < b.joinDate ? -1 : 1; });
  ['attn-emp','leave-emp'].forEach(function(id) {
    var sel = document.getElementById(id);
    sel.innerHTML = '<option value="">직원 선택</option>';
    storeEmps.forEach(function(e) {
      sel.innerHTML += '<option value="' + e.name + '">' + e.name + '</option>';
    });
  });
  renderLegend();
  var days = new Date(currentYear, currentMonth, 0).getDate();
  storeEmps.forEach(function(e) {
    storeShifts[e.name] = new Array(days).fill('근무');
  });
  loadShifts();
  loadLeaves();
  loadAttendance();
}

function updateHeaderMonth() {
  document.getElementById('header-month').textContent = currentYear + '년 ' + currentMonth + '월';
}

function renderLegend() {
  var el = document.getElementById('shift-legend');
  el.innerHTML = '';
  window._attnDefs.forEach(function(d) {
    var span = document.createElement('span');
    span.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:5px;font-size:12px;cursor:default;'
      + (d.bg ? 'background:' + d.bg + ';' : 'background:#F3F4F6;')
      + (d.textColor ? 'color:' + d.textColor + ';' : 'color:#374151;')
      + (d.fontBold ? 'font-weight:700;' : '')
      + 'border:1px solid ' + (d.bg || '#E5E7EB') + ';';
    span.textContent = d.label;
    el.appendChild(span);
  });
}

function loadShifts() {
  var ym = currentYear + '-' + String(currentMonth).padStart(2, '0');
  showStatus('⏳ 시프트 불러오는 중...');
  apiGet('getShifts', { store: currentStore, yearMonth: ym }).then(function(r) {
    if (r.ok && r.data) {
      r.data.forEach(function(row) {
        var name  = String(row[0] || '');
        var rowYm = String(row[2] || '');
        // 날짜 형식 정규화 (2026-05-31T15:00:00.000Z → 2026-06)
        if (rowYm.indexOf('T') > -1) rowYm = rowYm.slice(0, 7);
        if (rowYm === ym && storeShifts[name] !== undefined) {
          var days   = new Date(currentYear, currentMonth, 0).getDate();
          var shifts = row.slice(3).map(function(s) { return String(s || '근무'); });
          while (shifts.length < days) shifts.push('근무');
          storeShifts[name] = shifts.slice(0, days);
        }
      });
    }
    buildShiftTable();
    showStatus('✅ 로드 완료');
  }).catch(function() {
    buildShiftTable();
    showStatus('⚠️ 오프라인 모드', true);
  });
}

function buildShiftTable() {
  var days = new Date(currentYear, currentMonth, 0).getDate();
  var DOW  = ['일','월','화','수','목','금','토'];
  var head = document.getElementById('store-shift-head');
  var body = document.getElementById('store-shift-body');

  var hRow1 = '<tr style="background:#F9FAFB;">';
  var hRow2 = '<tr style="background:#F3F4F6;font-size:11px;">';
  hRow1 += '<th style="padding:8px 14px;text-align:left;font-size:12px;font-weight:600;color:#374151;position:sticky;left:0;background:#F9FAFB;z-index:10;white-space:nowrap;border-right:1px solid #E5E7EB;">직원명</th>';
  hRow2 += '<th style="position:sticky;left:0;background:#F3F4F6;z-index:10;border-right:1px solid #E5E7EB;"></th>';

  for (var d = 1; d <= days; d++) {
    var date = new Date(currentYear, currentMonth - 1, d);
    var dow  = date.getDay();
    var color = dow === 0 ? '#EF4444' : dow === 6 ? '#2563EB' : '#374151';
    var bl = (dow === 0 && d > 1) ? 'border-left:2px solid #374151;' : '';
    hRow1 += '<th style="min-width:46px;padding:6px 2px;text-align:center;font-size:12px;color:' + color + ';' + bl + '">' + d + '</th>';
    hRow2 += '<th style="padding:3px 2px;text-align:center;color:' + color + ';' + bl + '">' + DOW[dow] + '</th>';
  }
  hRow1 += '</tr>'; hRow2 += '</tr>';
  head.innerHTML = hRow1 + hRow2;

  var rows = '';
  storeEmps.forEach(function(emp) {
    var shifts = storeShifts[emp.name] || new Array(days).fill('근무');
    rows += '<tr>';
    rows += '<td style="padding:6px 14px;font-weight:600;font-size:12px;color:#111827;position:sticky;left:0;background:#fff;z-index:5;white-space:nowrap;border-right:1px solid #E5E7EB;">' + emp.name + '</td>';
    for (var d = 0; d < days; d++) {
      var s   = shifts[d] || '근무';
      var def = window._attnDefs.find(function(x) { return x.key === s; }) || {};
      var bg  = def.bg        ? 'background:' + def.bg + ';'         : '';
      var col = def.textColor ? 'color:' + def.textColor + ';'       : '';
      var bld = def.fontBold  ? 'font-weight:700;'                   : '';
      var date2 = new Date(currentYear, currentMonth - 1, d + 1);
      var bl = (date2.getDay() === 0 && d > 0) ? 'border-left:2px solid #374151;' : '';
      var label = def.label || s;
      rows += '<td class="cell" style="' + bg + col + bld + bl + '" data-emp="' + emp.name.replace(/'/g,"&#39;") + '" data-day="' + d + '" onclick="openCellPicker(this,this.dataset.emp,parseInt(this.dataset.day))">' + label + '</td>';
    }
    rows += '</tr>';
  });
  body.innerHTML = rows || '<tr><td colspan="32" style="padding:32px;text-align:center;color:#9CA3AF;">직원 정보를 불러오는 중...</td></tr>';
}

  _pickerEmp = empName; _pickerDay = dayIdx; _pickerTd = td;
  var picker = document.getElementById('cell-picker');
  picker.innerHTML = '';
  window._attnDefs.forEach(function(d) {
    var btn = document.createElement('button');
    btn.textContent = d.label;
    btn.style.cssText = 'display:block;width:100%;text-align:left;padding:7px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;margin-bottom:2px;'
      + (d.bg ? 'background:' + d.bg + ';' : 'background:#F9FAFB;')
      + (d.textColor ? 'color:' + d.textColor + ';' : '')
      + (d.fontBold ? 'font-weight:700;' : '');
    btn.onclick = function() {
      storeShifts[empName][dayIdx] = d.key;
      _pickerTd.style.background  = d.bg || '';
      _pickerTd.style.color       = d.textColor || '#111827';
      _pickerTd.style.fontWeight  = d.fontBold ? '700' : '';
      _pickerTd.textContent       = d.label;
      picker.style.display = 'none';
    };
    picker.appendChild(btn);
  });
  var rect = td.getBoundingClientRect();
  picker.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
  picker.style.left = (rect.left + window.scrollX) + 'px';
  picker.style.display = 'block';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#cell-picker') && !e.target.closest('.cell')) {
    document.getElementById('cell-picker').style.display = 'none';
  }
});

function saveAllShifts() {
  var ym    = currentYear + '-' + String(currentMonth).padStart(2, '0');
  var total = storeEmps.length;
  var done  = 0;
  if (!total) { showStatus('저장할 직원이 없습니다.', true); return; }
  showStatus('⏳ 저장 중...');
  storeEmps.forEach(function(emp) {
    var shifts = storeShifts[emp.name] || [];
    apiPost('saveShift', { name: emp.name, store: currentStore, yearMonth: ym, shifts: shifts })
      .then(function() { done++; if (done === total) showStatus('✅ 전체 저장 완료!'); })
      .catch(function() { showStatus('❌ 저장 실패', true); });
  });
}

function loadAttendance() {
  apiGet('getAttendance', { store: currentStore }).then(function(r) {
    if (r.ok && r.data) {
      attnRecords = r.data.map(function(row) {
        return { id: row[0], name: row[1], store: row[2], date: row[3], type: row[4], startTime: row[5], endTime: row[6], note: row[7] };
      });
      renderAttnList();
    }
  });
}
function renderAttnList() {
  var body = document.getElementById('attn-list-body');
  if (!attnRecords.length) {
    body.innerHTML = '<tr><td colspan="6" style="padding:32px;text-align:center;color:#9CA3AF;">기록된 근태가 없습니다.</td></tr>';
    return;
  }
  var typeColors = { '지각':'#F8BBD0','조퇴':'#F8BBD0','외출':'#FFF9C4','결근':'#FFCDD2','연차':'#C8E6C9','반차':'#C8E6C9','공가':'#FFE082','파견근무':'#BBDEFB' };
  body.innerHTML = attnRecords.slice().reverse().map(function(r) {
    var bg = typeColors[r.type] || '#F3F4F6';
    return '<tr style="border-bottom:1px solid #F3F4F6;">'
      + '<td style="padding:10px 16px;font-size:12px;color:#6B7280;">' + r.date + '</td>'
      + '<td style="padding:10px 16px;font-weight:600;">' + r.name + '</td>'
      + '<td style="padding:10px 16px;"><span style="background:' + bg + ';padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;">' + r.type + '</span></td>'
      + '<td style="padding:10px 16px;font-size:12px;">' + (r.startTime || '-') + '</td>'
      + '<td style="padding:10px 16px;font-size:12px;">' + (r.endTime || '-') + '</td>'
      + '<td style="padding:10px 16px;font-size:12px;color:#6B7280;">' + (r.note || '-') + '</td>'
      + '</tr>';
  }).join('');
}
function showAttnModal() {
  document.getElementById('attn-modal').style.display = 'flex';
  document.getElementById('attn-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('attn-err').style.display = 'none';
  document.getElementById('attn-start').value = '';
  document.getElementById('attn-end').value   = '';
  document.getElementById('attn-note').value  = '';
  document.getElementById('attn-type').value  = '';
  document.getElementById('attn-emp').value   = '';
  document.getElementById('attn-time-row').style.display = 'none';
}
function closeAttnModal() { document.getElementById('attn-modal').style.display = 'none'; }
function toggleAttnTime() {
  var type = document.getElementById('attn-type').value;
  document.getElementById('attn-time-row').style.display = ['지각','조퇴','외출'].indexOf(type) >= 0 ? 'grid' : 'none';
}
function submitAttn() {
  var emp   = document.getElementById('attn-emp').value;
  var date  = document.getElementById('attn-date').value;
  var type  = document.getElementById('attn-type').value;
  var start = document.getElementById('attn-start').value;
  var end   = document.getElementById('attn-end').value;
  var note  = document.getElementById('attn-note').value;
  var err   = document.getElementById('attn-err');
  if (!emp || !date || !type) { err.textContent = '직원, 날짜, 근태 유형은 필수입니다.'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  var record = { id: Date.now(), name: emp, store: currentStore, date: date, type: type, startTime: start, endTime: end, note: note };
  showStatus('⏳ 저장 중...');
  apiPost('saveAttendance', record).then(function(r) {
    if (r.ok) { attnRecords.push(record); renderAttnList(); closeAttnModal(); showStatus('✅ 근태 기록 저장됨'); }
    else { err.textContent = '저장 실패. 다시 시도해주세요.'; err.style.display = 'block'; }
  }).catch(function() { err.textContent = '서버 오류. 다시 시도해주세요.'; err.style.display = 'block'; });
}

function loadLeaves() {
  apiGet('getLeaves', { store: currentStore }).then(function(r) {
    if (r.ok && r.data) {
      leaveRecords = r.data.map(function(row) {
        return { id: row[0], dt: row[1], store: row[2], name: row[3], type: row[4], date: row[5], reason: row[6], status: row[7] };
      });
      renderLeaveList();
    }
  });
}
function renderLeaveList() {
  var body = document.getElementById('leave-list-body');
  if (!leaveRecords.length) {
    body.innerHTML = '<tr><td colspan="6" style="padding:32px;text-align:center;color:#9CA3AF;">신청 내역이 없습니다.</td></tr>';
    return;
  }
  var slabel = {
    pending:  '<span style="background:#FEF9C3;color:#92400E;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">대기중</span>',
    approved: '<span style="background:#ECFDF5;color:#059669;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">승인</span>',
    rejected: '<span style="background:#FEF2F2;color:#DC2626;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">반려</span>'
  };
  body.innerHTML = leaveRecords.slice().reverse().map(function(r) {
    return '<tr style="border-bottom:1px solid #F3F4F6;">'
      + '<td style="padding:10px 16px;font-size:12px;color:#6B7280;">' + r.dt + '</td>'
      + '<td style="padding:10px 16px;font-weight:600;">' + r.name + '</td>'
      + '<td style="padding:10px 16px;"><span style="background:#EFF6FF;color:#2563EB;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;">' + r.type + '</span></td>'
      + '<td style="padding:10px 16px;">' + r.date + '</td>'
      + '<td style="padding:10px 16px;font-size:12px;color:#6B7280;">' + r.reason + '</td>'
      + '<td style="padding:10px 16px;">' + (slabel[r.status] || r.status) + '</td>'
      + '</tr>';
  }).join('');
}
function showLeaveModal() {
  document.getElementById('leave-modal').style.display = 'flex';
  document.getElementById('leave-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('leave-err').style.display  = 'none';
  document.getElementById('leave-type').value   = '';
  document.getElementById('leave-emp').value    = '';
  document.getElementById('leave-reason').value = '';
}
function closeLeaveModal() { document.getElementById('leave-modal').style.display = 'none'; }
function submitLeave() {
  var emp    = document.getElementById('leave-emp').value;
  var type   = document.getElementById('leave-type').value;
  var date   = document.getElementById('leave-date').value;
  var reason = document.getElementById('leave-reason').value;
  var err    = document.getElementById('leave-err');
  if (!emp || !type || !date || !reason) { err.textContent = '모든 항목을 입력해주세요.'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  var now    = new Date().toLocaleString('ko-KR');
  var record = { id: Date.now(), dt: now, store: currentStore, name: emp, type: type, date: date, reason: reason, status: 'pending' };
  showStatus('⏳ 신청 중...');
  apiPost('saveLeave', record).then(function(r) {
    if (r.ok) { leaveRecords.push(record); renderLeaveList(); closeLeaveModal(); showStatus('✅ 신청 완료! 관리자 승인 후 반영됩니다.'); }
    else { err.textContent = '신청 실패. 다시 시도해주세요.'; err.style.display = 'block'; }
  }).catch(function() { err.textContent = '서버 오류.'; err.style.display = 'block'; });
}

function showTab(tab) {
  ['shift','attn','leave'].forEach(function(t) {
    document.getElementById('tab-' + t + '-content').style.display = t === tab ? 'block' : 'none';
    var btn = document.getElementById('tab-' + t);
    btn.style.borderBottom = t === tab ? '2px solid #2563EB' : '2px solid transparent';
    btn.style.color = t === tab ? '#2563EB' : '#6B7280';
    btn.style.fontWeight = t === tab ? '700' : '600';
  });
}
document.getElementById('shift-year').addEventListener('change', function() {
  if (currentStore) { currentYear = parseInt(this.value); init(); }
});
document.getElementById('shift-month').addEventListener('change', function() {
  if (currentStore) { currentMonth = parseInt(this.value); init(); }
});

</script>
</body>
